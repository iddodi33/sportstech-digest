name: Daily SportsTech Monitor

on:
  schedule:
    - cron: '0 9 * * *'  # 9am UTC every day
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily monitor
        run: python daily_monitor.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          ALERT_FROM: monitor@sportsd3c0d3d.ie
          ALERT_TO: iddodiamant@gmail.com

      - name: Commit seen URLs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_monitor_seen.json || true
          git diff --staged --quiet || git commit -m "chore: update seen URLs $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
