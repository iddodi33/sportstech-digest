name: Monthly SportsTech Digest

on:
  schedule:
    - cron: '0 9 1 * *'  # 9am UTC on the 1st of each month
  workflow_dispatch:      # allow manual trigger

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monthly pipeline
        run: |
          python enhanced_sportstech_job_scraper_v3.py
          python news_pipeline.py
          python digest.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Commit research output
        run: |
          git config --global user.email "monitor@sportsd3c0d3d.com"
          git config --global user.name "SportsTech Bot"
          git add research/
          git diff --staged --quiet || git commit -m "Monthly digest $(date +%Y-%m)"
          git push
